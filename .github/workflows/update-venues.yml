name: Actualizar lugares (música en vivo)

# Corre los lunes 09:30 UTC (~06:30 Argentina) y también a mano.
on:
  schedule:
    - cron: '30 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generar envivo/venues.json
        run: node envivo/build-venues.mjs

      - name: Commitear si hubo cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add envivo/venues.json
          if git diff --staged --quiet; then
            echo "Sin cambios en venues.json"
          else
            git commit -m "Actualizar lugares de música en vivo (datos abiertos)"
            git push
          fi
