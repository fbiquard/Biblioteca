name: Actualizar series

# Automatización PAUSADA (proyecto en pausa). Ya no corre sola cada semana.
# Queda disponible solo para ejecutarla a mano desde la pestaña Actions si hiciera falta.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generar data/series.json
        run: node scripts/build-series.mjs

      - name: Commitear si hubo cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/series.json
          if git diff --staged --quiet; then
            echo "Sin cambios."
          else
            git commit -m "Actualizar Top 10 y Estrenos (datos TMDB)"
            git push
          fi
