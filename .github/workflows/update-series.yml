name: Actualizar series

# Corre solo todos los lunes 09:00 UTC (~06:00 Argentina) y también a mano.
on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generar data/series.json
        run: node scripts/build-series.mjs

      - name: Commitear si hubo cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/series.json
          if git diff --staged --quiet; then
            echo "Sin cambios."
          else
            git commit -m "Actualizar Top 10 y Estrenos (datos TMDB)"
            git push
          fi
