    .count-pill:active { transform: scale(0.96); }
    .count-pill .n { color: var(--text-primary); font-weight: 800; }
    @media (hover: hover) { .count-pill:hover { border-color: var(--accent); color: var(--text-primary); } }

    .filters { max-width: 1080px; margin: 0 auto; display: flex; gap: 8px; overflow-x: auto; padding: 2px 20px 14px; scrollbar-width: none; }

    .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; display: flex; flex-direction: column; transition: transform .2s, box-shadow .2s, border-color .2s; }

    .card-meta { display: flex; align-items: center; gap: 8px; font-size: 11.5px; color: var(--text-muted); font-weight: 600; }

    .btn-del { flex: 0 0 auto; width: 44px; padding: 11px 0; background: var(--surface); border: 1px solid var(--border); border-radius: 11px; color: var(--text-muted); cursor: pointer; font-size: 15px; transition: all .16s; }
    @media (hover: hover) { .btn-del:hover { color: var(--accent); border-color: var(--accent); } }
    .btn-del:active { transform: scale(0.94); }

    .status-tag.wishT { background: var(--accent-dim); color: var(--accent-light); }
    .status-tag.seenT { background: rgba(70,211,105,0.14); color: var(--green); }

    .empty { text-align: center; padding: 70px 20px; color: var(--text-muted); }

    .empty h3 { font-size: 18px; color: var(--text-secondary); font-weight: 700; margin-bottom: 8px; }
    .empty p { font-size: 14px; max-width: 320px; margin: 0 auto; line-height: 1.55; }

    .toast { position: fixed; left: 50%; bottom: calc(24px + env(safe-area-inset-bottom, 0px)); transform: translateX(-50%) translateY(20px); z-index: 400; background: #2a2731; border: 1px solid var(--border); color: var(--text-primary); padding: 13px 20px; border-radius: 50px; font-size: 14px; font-weight: 600; box-shadow: 0 10px 40px rgba(0,0,0,0.6); opacity: 0; pointer-events: none; transition: opacity .25s, transform .25s; display: flex; align-items: center; gap: 9px; max-width: 90vw; }

  </style>
</head>

];

/* ---------- Estado ---------- */
const LS = { wish:"topseries_wishlist", seen:"topseries_seen" };
function load(k){ try { return JSON.parse(localStorage.getItem(k)) || []; } catch(e){ return []; } }
function save(k,v){ localStorage.setItem(k, JSON.stringify(v)); }
let wish = load(LS.wish);
let seen = load(LS.seen);
let view = "all"; // all | <platformId> | wishlist | seen

/* ---------- Helpers ---------- */
function rtClass(rt){ return rt >= 90 ? "certified" : (rt >= 60 ? "fresh" : ""); }
function rtIcon(rt){ return rt >= 60 ? "🍅" : "🤢"; }
function inWish(id){ return wish.includes(id); }
function inSeen(id){ return seen.includes(id); }

/* ---------- Render filtros ---------- */
function renderFilters(){
  const box = document.getElementById("filters");
  let html = `<button class="chip ${view==='all'?'active acc':''}" onclick="setView('all')">⭐ Top general</button>`;
  for (const [pid, pl] of Object.entries(PLATFORMS)){
    html += `<button class="chip ${view===pid?'active':''}" onclick="setView('${pid}')"><span class="dot" style="background:${pl.color}"></span>${pl.name}</button>`;
  }
  html += `<button class="chip ${view==='wishlist'?'active':''}" onclick="setView('wishlist')">❤️ Mi wishlist</button>`;
  html += `<button class="chip ${view==='seen'?'active':''}" onclick="setView('seen')">✅ Ya vistas</button>`;
  box.innerHTML = html;
}

/* ---------- Render grilla ---------- */
function currentList(){
  let list;
  if (view === "all") list = SERIES.slice();
  else if (view === "wishlist") list = SERIES.filter(s => inWish(s.id));
  else if (view === "seen") list = SERIES.filter(s => inSeen(s.id));
  else list = SERIES.filter(s => s.p === view);
  return list.sort((a,b) => b.rt - a.rt);
}

function render(){
  renderFilters();
  document.getElementById("cntWish").textContent = wish.length;
  document.getElementById("cntSeen").textContent = seen.length;

  const list = currentList();
  const titles = { all:"Top series del streaming", wishlist:"Mi wishlist", seen:"Series que ya vi" };
  let title = titles[view] || `Top en ${PLATFORMS[view] ? PLATFORMS[view].name : ''}`;
  document.getElementById("secTitle").textContent = title;
  document.getElementById("secSub").textContent = list.length ? `${list.length} ${list.length===1?'serie':'series'} · ordenadas por Tomatometer` : "";

  const grid = document.getElementById("grid");

  if (!list.length){
    const empties = {
      wishlist: { i:"❤️", h:"Tu wishlist está vacía", p:"Explorá las plataformas y tocá “Wishlist” en las series que querés ver." },
      seen:     { i:"🍿", h:"Todavía no marcaste series vistas", p:"Cuando termines una, tocá “Ya la vi” para llevar el registro." }
    };
    const em = empties[view] || { i:"🎬", h:"No hay series para mostrar", p:"Probá con otro filtro." };
    grid.style.display = "block";
    grid.innerHTML = `<div class="empty"><div class="e-icon">${em.i}</div><h3>${em.h}</h3><p>${em.p}</p></div>`;
    return;
  }
  grid.style.display = "grid";

  grid.innerHTML = list.map((s, idx) => {
    const pl = PLATFORMS[s.p];
    const w = inWish(s.id), v = inSeen(s.id);
    const showRank = (view === "all" || PLATFORMS[view]);
    const isListView = (view === "wishlist" || view === "seen");

    let statusTag = "";
    if (view === "wishlist") statusTag = `<span class="status-tag wishT">❤️ En tu wishlist</span>`;
    if (view === "seen") statusTag = `<span class="status-tag seenT">✅ Ya la viste</span>`;

    let actions;
    if (isListView){
      const otherBtn = view === "wishlist"
        ? `<button class="btn seen ${v?'on':''}" onclick="toggleSeen('${s.id}', event)">${v?'✓ Vista':'Marcar vista'}</button>`
        : `<button class="btn wish ${w?'on':''}" onclick="toggleWish('${s.id}', event)">${w?'❤️ En wishlist':'+ Wishlist'}</button>`;
      actions = `${otherBtn}<button class="btn-del" title="Quitar" onclick="removeFrom('${view}','${s.id}', event)">🗑️</button>`;
    } else {
      actions = `
        <button class="btn wish ${w?'on':''}" onclick="toggleWish('${s.id}', event)">${w?'❤️ En wishlist':'+ Wishlist'}</button>
        <button class="btn seen ${v?'on':''}" onclick="toggleSeen('${s.id}', event)">${v?'✓ Vista':'Ya la vi'}</button>`;
    }

    return `
    <div class="card">
      <div class="poster" style="background:${s.grad}">
        ${showRank ? `<div class="rank-badge">#${idx+1}</div>` : ``}
        <div class="rt-badge ${rtClass(s.rt)}">${rtIcon(s.rt)} ${s.rt}%</div>
        <span class="emoji">${s.e}</span>
        <span class="plat-badge"><span class="dot" style="background:${pl.color}"></span>${pl.name}</span>
      </div>
      <div class="card-body">
        ${statusTag}
        <div class="card-meta"><span class="genre">${s.g}</span> · <span>${s.yr}</span></div>
        <div class="card-title">${s.t}</div>
        <div class="card-syn">${s.s}</div>
        <div class="card-actions">${actions}</div>
      </div>
    </div>`;
  }).join("");
}

/* ---------- Acciones ---------- */
function setView(v){ view = v; window.scrollTo({top:0,behavior:"smooth"}); render(); }

function toggleWish(id, ev){
  if (ev) ev.stopPropagation();
  const s = SERIES.find(x=>x.id===id);
  if (inWish(id)){ wish = wish.filter(x=>x!==id); toast(`“${s.t}” fuera de tu wishlist`); }
  else {
    wish.push(id);
    seen = seen.filter(x=>x!==id); // si la querés ver, no estaba "vista"
    toast(`“${s.t}” agregada a tu wishlist ❤️`);
  }
  save(LS.wish, wish); save(LS.seen, seen); render();
}

function toggleSeen(id, ev){
  if (ev) ev.stopPropagation();
  const s = SERIES.find(x=>x.id===id);
  if (inSeen(id)){ seen = seen.filter(x=>x!==id); toast(`“${s.t}” ya no figura como vista`); }
  else {
    seen.push(id);
    wish = wish.filter(x=>x!==id); // si ya la viste, sale de la wishlist
    toast(`“${s.t}” marcada como vista ✅`);
  }
  save(LS.seen, seen); save(LS.wish, wish); render();
}

function removeFrom(listName, id, ev){
  if (ev) ev.stopPropagation();
  const s = SERIES.find(x=>x.id===id);
  if (listName === "wishlist"){ wish = wish.filter(x=>x!==id); save(LS.wish, wish); toast(`“${s.t}” eliminada de la wishlist`); }
  else { seen = seen.filter(x=>x!==id); save(LS.seen, seen); toast(`“${s.t}” eliminada de vistas`); }
  render();
}

/* ---------- Toast ---------- */
let toastTimer;
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> t.classList.remove("show"), 2200);
}

/* ---------- Init ---------- */
render();
</script>
</body>
</html>
