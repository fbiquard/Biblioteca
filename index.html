<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>TopSeries · Lo que se ve en Argentina</title>
  <meta name="description" content="El Top 10 y los estrenos de Netflix, Max, Apple TV+, Prime Video, Paramount+ y Disney+ en Argentina. Armá tu wishlist y marcá lo que ya viste." />
  <style>
    :root {
      --bg:#0d0c0f; --surface:#16151a; --card:#1d1b22; --border:#322f3a;
      --text-primary:#f2eef7; --text-secondary:#a39db0; --text-muted:#6b6577;
      --accent:#fa3e3e; --accent-light:#ff6b6b; --accent-dim:rgba(250,62,62,0.14);
      --green:#46d369; --radius:16px;
    }
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    body { background:var(--bg); color:var(--text-primary); font-family:-apple-system,"SF Pro Display","Segoe UI","Helvetica Neue",sans-serif; min-height:100vh; }

    .app-header { position:sticky; top:0; z-index:100; background:rgba(13,12,15,0.92); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-bottom:1px solid var(--border); }
    .header-top { padding:env(safe-area-inset-top,14px) 20px 12px; }
    .header-inner { max-width:1100px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; gap:16px; }
    .logo { display:flex; align-items:center; gap:11px; }
    .logo-icon { width:38px; height:38px; background:linear-gradient(135deg,#fa3e3e,#ff8a3e); border-radius:11px; display:flex; align-items:center; justify-content:center; font-size:20px; box-shadow:0 4px 14px rgba(250,62,62,0.3); }
    .logo-text h1 { font-size:19px; font-weight:800; letter-spacing:-0.4px; }
    .logo-text span { font-size:12px; color:var(--text-muted); }
    .header-counts { display:flex; gap:8px; }
    .count-pill { display:flex; align-items:center; gap:6px; padding:8px 13px; background:var(--card); border:1px solid var(--border); border-radius:50px; font-size:13px; font-weight:600; cursor:pointer; color:var(--text-secondary); white-space:nowrap; transition:border-color .2s,color .2s; }
    .count-pill.active { border-color:var(--accent); color:var(--text-primary); }
    .count-pill:active { transform:scale(0.96); }
    .count-pill .n { color:var(--text-primary); font-weight:800; }
    @media (hover:hover){ .count-pill:hover{ border-color:var(--accent); color:var(--text-primary); } }

    .toggle-wrap { max-width:1100px; margin:0 auto; padding:2px 20px 10px; }
    .segmented { display:inline-flex; background:var(--card); border:1px solid var(--border); border-radius:50px; padding:4px; gap:4px; }
    .seg { display:inline-flex; align-items:center; gap:7px; padding:8px 18px; border-radius:50px; font-size:14px; font-weight:700; color:var(--text-secondary); cursor:pointer; border:none; background:transparent; transition:all .18s; }
    .seg.active { background:var(--text-primary); color:#14121a; }
    .seg:active { transform:scale(0.96); }

    .filters { max-width:1100px; margin:0 auto; display:flex; gap:8px; overflow-x:auto; padding:2px 20px 14px; scrollbar-width:none; }
    .filters::-webkit-scrollbar { display:none; }
    .chip { flex-shrink:0; display:inline-flex; align-items:center; gap:7px; padding:8px 15px; background:var(--card); border:1px solid var(--border); border-radius:50px; font-size:13.5px; font-weight:600; color:var(--text-secondary); cursor:pointer; transition:all .18s; }
    .chip:active { transform:scale(0.95); }
    .chip .dot { width:8px; height:8px; border-radius:50%; }
    .chip.active { background:var(--text-primary); color:#14121a; border-color:var(--text-primary); }

    .main { max-width:1100px; margin:0 auto; padding:20px 20px 80px; }
    .section-head { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:18px; gap:12px; flex-wrap:wrap; }
    .section-head h2 { font-size:22px; font-weight:800; letter-spacing:-0.5px; }
    .section-head .sub { font-size:12.5px; color:var(--text-muted); }
    .back-btn { display:inline-flex; align-items:center; gap:7px; background:var(--card); border:1px solid var(--border); color:var(--text-secondary); border-radius:50px; padding:8px 15px; font-size:13.5px; font-weight:600; cursor:pointer; margin-bottom:16px; }
    .back-btn:active { transform:scale(0.96); }

    .banner { background:var(--accent-dim); border:1px solid rgba(250,62,62,0.3); color:var(--accent-light); border-radius:12px; padding:11px 15px; font-size:13px; margin-bottom:18px; line-height:1.5; }

    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(158px,1fr)); gap:16px; }
    .pcard { display:flex; flex-direction:column; gap:9px; }
    .pwrap { position:relative; width:100%; aspect-ratio:2/3; border-radius:14px; overflow:hidden; border:1px solid var(--border); background:var(--card); display:flex; align-items:center; justify-content:center; }
    .pwrap img { width:100%; height:100%; object-fit:cover; display:block; }
    .pwrap .ph { font-size:46px; }
    .pwrap::after { content:''; position:absolute; inset:0; background:linear-gradient(to bottom,rgba(0,0,0,0.05) 45%,rgba(0,0,0,0.55)); pointer-events:none; }
    @media (hover:hover){ .pcard:hover .pwrap { border-color:#4a4556; } }

    .rank { position:absolute; top:8px; left:8px; z-index:2; min-width:30px; height:30px; padding:0 8px; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.62); backdrop-filter:blur(6px); border:1px solid rgba(255,255,255,0.16); border-radius:9px; font-size:15px; font-weight:800; }
    .plat { position:absolute; bottom:8px; left:8px; z-index:2; display:inline-flex; align-items:center; gap:6px; background:rgba(0,0,0,0.58); backdrop-filter:blur(6px); border-radius:50px; padding:4px 10px 4px 8px; font-size:11px; font-weight:700; }
    .plat .dot { width:8px; height:8px; border-radius:50%; }
    .ribbon { position:absolute; top:8px; right:8px; z-index:2; width:30px; height:30px; display:flex; align-items:center; justify-content:center; border-radius:9px; font-size:14px; backdrop-filter:blur(6px); }
    .ribbon.w { background:var(--accent); }
    .ribbon.s { background:var(--green); color:#10210f; }

    .ptitle { font-size:14px; font-weight:700; line-height:1.3; letter-spacing:-0.2px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .pmeta { font-size:11.5px; color:var(--text-muted); font-weight:600; margin-top:-3px; }
    .pmeta .yr { color:var(--accent-light); }
    .pacts { display:flex; gap:7px; margin-top:1px; }
    .ab { flex:1; display:inline-flex; align-items:center; justify-content:center; gap:5px; padding:9px 6px; border-radius:9px; font-size:12px; font-weight:700; border:1px solid var(--border); background:var(--surface); color:var(--text-primary); cursor:pointer; transition:all .15s; }
    .ab:active { transform:scale(0.95); }
    .ab.w.on { background:var(--accent); border-color:var(--accent); color:#fff; }
    .ab.s.on { background:rgba(70,211,105,0.16); border-color:var(--green); color:var(--green); }
    .ab.del { flex:0 0 auto; width:38px; color:var(--text-muted); }
    @media (hover:hover){ .ab:hover{ border-color:#56505f; } .ab.del:hover{ color:var(--accent); border-color:var(--accent); } }

    .empty { grid-column:1/-1; text-align:center; padding:60px 20px; color:var(--text-muted); }
    .empty .e-icon { font-size:52px; margin-bottom:14px; }
    .empty h3 { font-size:18px; color:var(--text-secondary); font-weight:700; margin-bottom:8px; }
    .empty p { font-size:14px; max-width:320px; margin:0 auto; line-height:1.55; }

    .toast { position:fixed; left:50%; bottom:calc(24px + env(safe-area-inset-bottom,0px)); transform:translateX(-50%) translateY(20px); z-index:400; background:#2a2731; border:1px solid var(--border); color:var(--text-primary); padding:13px 20px; border-radius:50px; font-size:14px; font-weight:600; box-shadow:0 10px 40px rgba(0,0,0,0.6); opacity:0; pointer-events:none; transition:opacity .25s,transform .25s; display:flex; align-items:center; gap:9px; max-width:90vw; }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    .footer-note { max-width:1100px; margin:0 auto; padding:0 20px 50px; font-size:12px; color:var(--text-muted); line-height:1.6; text-align:center; }
  </style>
</head>

<header class="app-header">

function buildSample(){
  const o = { updated_at:null, region:"AR", platforms:{}, top10:{}, estrenos:{} };
  for (const [pid,p] of Object.entries(PLATFORMS)){
    o.platforms[pid] = { name:p.name, color:p.color };
    const items = SAMPLE.filter(s => s.p === pid);
    const mk = (s,i) => ({ rank:i+1, id:s.id, title:s.t, year:s.yr, date:"", genre:s.g, overview:s.s, poster:null, emoji:s.e, grad:s.grad, rating:null });
    o.top10[pid]   = items.slice().sort((a,b)=> (b.yr+ (b.id.length%7)) - (a.yr+(a.id.length%7)) ).map(mk);
    o.estrenos[pid]= items.slice().sort((a,b)=> b.yr - a.yr).map(mk);
  }
  return o;
}

/* ===== Estado ===== */
const LS = { wish:"ts_wishlist_v2", seen:"ts_seen_v2" };
function load(k){ try { return JSON.parse(localStorage.getItem(k)) || []; } catch(e){ return []; } }
function persist(){ localStorage.setItem(LS.wish, JSON.stringify(wish)); localStorage.setItem(LS.seen, JSON.stringify(seen)); }
let wish = load(LS.wish);
let seen = load(LS.seen);

let DATA = null, IS_SAMPLE = false;
let mode = "browse";        // browse | wishlist | seen
let tab = "top10";          // top10 | estrenos
let platform = "netflix";

/* ===== Helpers ===== */
const idOf = x => String(x.id);
const inWish = id => wish.some(x => idOf(x) === String(id));
const inSeen = id => seen.some(x => idOf(x) === String(id));

function init(){
  fetch("./data/series.json", { cache:"no-store" })
    .then(r => { if(!r.ok) throw new Error("no data"); return r.json(); })
    .then(j => { DATA = j; IS_SAMPLE = false; render(); })
    .catch(() => { DATA = buildSample(); IS_SAMPLE = true; render(); });
}

function placeholderHTML(item){
  const grad = item.grad || "linear-gradient(135deg,#262335,#3a3550)";
  const inner = item.emoji ? `<span class="ph">${item.emoji}</span>` : `<span class="ph">${(item.title||'?').slice(0,1)}</span>`;
  return `<div class="pwrap" style="background:${grad}">__BADGES__${inner}</div>`;
}

/* ===== Render ===== */
function render(){
  document.getElementById("cntWish").textContent = wish.length;
  document.getElementById("cntSeen").textContent = seen.length;
  document.getElementById("pillWish").classList.toggle("active", mode==="wishlist");
  document.getElementById("pillSeen").classList.toggle("active", mode==="seen");

  const browse = (mode === "browse");
  document.getElementById("toggleWrap").style.display = browse ? "" : "none";
  document.getElementById("filters").style.display = browse ? "" : "none";
  document.getElementById("segTop").classList.toggle("active", tab==="top10");
  document.getElementById("segEst").classList.toggle("active", tab==="estrenos");

  // chips de plataforma
  if (browse){
    let html = "";
    for (const [pid,pl] of Object.entries(PLATFORMS)){
      html += `<button class="chip ${platform===pid?'active':''}" onclick="setPlatform('${pid}')"><span class="dot" style="background:${pl.color}"></span>${pl.name}</button>`;
    }
    document.getElementById("filters").innerHTML = html;
  }

  // back / banner
  document.getElementById("backRow").innerHTML = browse ? "" :
    `<button class="back-btn" onclick="setMode('browse')">← Volver al inicio</button>`;

  let bannerHTML = "";
  if (browse && IS_SAMPLE){
    bannerHTML = `📊 Mostrando <strong>datos de ejemplo</strong>. Cuando el robot de actualización corra por primera vez, vas a ver el Top 10 y los estrenos reales de Argentina.`;
  }
  document.getElementById("banner").innerHTML = bannerHTML ? `<div class="banner">${bannerHTML}</div>` : "";

  // lista + títulos
  let list, title, sub = "";
  if (mode === "wishlist"){ list = wish.slice().reverse(); title = "Mi wishlist ❤️"; }
  else if (mode === "seen"){ list = seen.slice().reverse(); title = "Ya las vi ✅"; }
  else {
    list = (DATA[tab] && DATA[tab][platform]) ? DATA[tab][platform] : [];
    const plName = PLATFORMS[platform].name;
    title = (tab === "top10" ? `🔥 Top 10 · ${plName}` : `🆕 Estrenos · ${plName}`);
    if (DATA.updated_at){
      const d = new Date(DATA.updated_at);
      sub = "Actualizado " + d.toLocaleDateString("es-AR",{day:"numeric",month:"long"});
    } else sub = "Datos de ejemplo";
  }
  document.getElementById("secTitle").textContent = title;
  document.getElementById("secSub").textContent = sub;

  const grid = document.getElementById("grid");
  if (!list.length){
    const em = mode==="wishlist"
      ? { i:"❤️", h:"Tu wishlist está vacía", p:"Tocá el corazón en las series que querés ver." }
      : mode==="seen"
      ? { i:"🍿", h:"Todavía no marcaste vistas", p:"Cuando termines una, tocá el ✓ para registrarla." }
      : { i:"🎬", h:"Sin datos para mostrar", p:"Probá con otra plataforma o pestaña." };
    grid.innerHTML = `<div class="empty"><div class="e-icon">${em.i}</div><h3>${em.h}</h3><p>${em.p}</p></div>`;
    return;
  }

  grid.innerHTML = list.map(item => cardHTML(item, browse ? platform : item.p, browse)).join("");
}

function cardHTML(item, pid, browse){
  const pl = PLATFORMS[pid] || { name:"", color:"#888" };
  const id = idOf(item);
  const w = inWish(id), s = inSeen(id);

  const rankBadge = browse ? `<div class="rank">#${item.rank}</div>` : "";
  const platBadge = `<span class="plat"><span class="dot" style="background:${pl.color}"></span>${pl.name}</span>`;
  const ribbon = (mode==="wishlist") ? `<div class="ribbon w">❤️</div>` : (mode==="seen") ? `<div class="ribbon s">✓</div>` : "";
  const badges = rankBadge + platBadge + ribbon;

  let cover;
  if (item.poster){
    cover = `<div class="pwrap">${badges}<img loading="lazy" src="${item.poster}" alt="${escAttr(item.title)}" onerror="this.style.display='none'"></div>`;
  } else {
    cover = placeholderHTML(item).replace("__BADGES__", badges);
  }

  const meta = [item.genre, item.year].filter(Boolean);
  const metaHTML = meta.length ? `<div class="pmeta"><span class="yr">${item.year||""}</span>${item.genre? " · "+item.genre : ""}</div>` : "";

  let acts;
  if (mode === "browse"){
    acts = `<button class="ab w ${w?'on':''}" onclick="toggleWish('${id}',event)">${w?'❤️':'🤍'} <span>${w?'Guardada':'Wishlist'}</span></button>
            <button class="ab s ${s?'on':''}" onclick="toggleSeen('${id}',event)">${s?'✓':'＋'} <span>${s?'Vista':'Ya la vi'}</span></button>`;
  } else if (mode === "wishlist"){
    acts = `<button class="ab s ${s?'on':''}" onclick="toggleSeen('${id}',event)">${s?'✓ Vista':'Ya la vi'}</button>
            <button class="ab del" title="Quitar" onclick="removeFrom('wishlist','${id}',event)">🗑️</button>`;
  } else {
    acts = `<button class="ab w ${w?'on':''}" onclick="toggleWish('${id}',event)">${w?'❤️ Guardada':'Wishlist'}</button>
            <button class="ab del" title="Quitar" onclick="removeFrom('seen','${id}',event)">🗑️</button>`;
  }

  return `<div class="pcard">${cover}
    <div class="ptitle">${escHTML(item.title)}</div>
    ${metaHTML}
    <div class="pacts">${acts}</div>
  </div>`;
}

function escHTML(t){ return String(t||"").replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function escAttr(t){ return String(t||"").replace(/"/g,'&quot;'); }

/* ===== Buscar un item por id en los datos actuales (para snapshot) ===== */
function findItem(id){
  for (const tb of ["top10","estrenos"]){
    for (const pid of Object.keys(DATA[tb]||{})){
      const hit = (DATA[tb][pid]||[]).find(x => idOf(x) === String(id));
      if (hit) return { item:hit, pid };
    }
  }
  // si no está en los datos vivos, buscar en wish/seen ya guardados
  const saved = wish.find(x=>idOf(x)===String(id)) || seen.find(x=>idOf(x)===String(id));
  if (saved) return { item:saved, pid:saved.p };
  return null;
}
function snapshot(id){
  const f = findItem(id); if (!f) return null;
  const pl = PLATFORMS[f.pid] || {};
  return { ...f.item, p:f.pid, platformName:pl.name, color:pl.color };
}

/* ===== Acciones ===== */
function setMode(m){ mode = m; scrollTop(); render(); }
function setTab(t){ tab = t; mode = "browse"; scrollTop(); render(); }
function setPlatform(p){ platform = p; mode = "browse"; scrollTop(); render(); }
function scrollTop(){ window.scrollTo({ top:0, behavior:"smooth" }); }

function toggleWish(id, ev){
  if (ev) ev.stopPropagation();
  const snap = snapshot(id);
  if (inWish(id)){ wish = wish.filter(x=>idOf(x)!==String(id)); toast(`Quitada de tu wishlist`); }
  else { if(!snap) return; wish.push(snap); seen = seen.filter(x=>idOf(x)!==String(id)); toast(`“${snap.title}” a tu wishlist ❤️`); }
  persist(); render();
}
function toggleSeen(id, ev){
  if (ev) ev.stopPropagation();
  const snap = snapshot(id);
  if (inSeen(id)){ seen = seen.filter(x=>idOf(x)!==String(id)); toast(`Ya no figura como vista`); }
  else { if(!snap) return; seen.push(snap); wish = wish.filter(x=>idOf(x)!==String(id)); toast(`“${snap.title}” marcada como vista ✅`); }
  persist(); render();
}
function removeFrom(listName, id, ev){
  if (ev) ev.stopPropagation();
  if (listName==="wishlist") wish = wish.filter(x=>idOf(x)!==String(id));
  else seen = seen.filter(x=>idOf(x)!==String(id));
  persist(); toast("Eliminada"); render();
}

/* ===== Toast ===== */
let toastTimer;
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> t.classList.remove("show"), 2200);
}

document.getElementById("footerNote").textContent =
  "Datos de TMDB · disponibilidad y popularidad para Argentina. Tu wishlist y tus vistas se guardan en este dispositivo.";

init();
</script>
